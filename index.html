                 { name: "WATER", price: "0.50$" },

  <!--  ⚙️  ENGINE — DO NOT EDIT BELOW. It just turns the list above into the -->

  <script>
  (function () {
    var cls = function (id) { return "filter-" + id; };

    function itemHTML(it, catId) {
      // A "note" line: centered italic label, no price.
      if (it.kind === "note") {
        return '' +
          '<div class="col-lg-12 menu-item ' + cls(catId) + '">' +
          '  <br>' +
          '  <div class="text-center" id="mix"><b><i>' + it.text + '</i></b></div>' +
          '</div>';
      }
      // A normal dish: name + price, plus optional description.
      var desc = it.desc ? '<div class="menu-ingredients">' + it.desc + '</div>' : '';
      return '' +
        '<div class="col-lg-6 menu-item ' + cls(catId) + '">' +
        '  <div class="menu-content">' + it.name + ' <span>' + it.price + '</span></div>' +
        desc +
        '</div>';
    }

    function categoryHTML(cat) {
      var headerNote = cat.headerNote
        ? '<div class="text-center" id="mix">' + cat.headerNote + '</div>'
        : '';
      var header = '' +
        '<div class="col-lg-12 menu-item ' + cls(cat.id) + '">' +
        '  <br>' +
        '  <div class="text-center" id="Head"><b>' + cat.title + '</b></div>' +
        headerNote +
        '</div>';
      var items = cat.items.map(function (it) { return itemHTML(it, cat.id); }).join('');
      var divider = '<div class="col-lg-12 menu-item ' + cls(cat.id) + '"><hr></div>';
      return header + items + divider;
    }

    // Build the filter buttons ("Show All" is always first and always there).
    var filters = document.getElementById('menu-flters');
    if (filters) {
      filters.innerHTML =
        '<li data-filter="*" class="filter-active">Show All</li>' +
        MENU.map(function (c) {
          return '<li data-filter=".' + cls(c.id) + '">' + c.label + '</li>';
        }).join('');
    }

    // Build the menu body.
    var container = document.querySelector('.menu-container');
    if (container) {
      container.innerHTML = MENU.map(categoryHTML).join('');
    }
  })();
  </script>
